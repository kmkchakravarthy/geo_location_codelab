<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results for {{ location }}</title>
</head>
<body>
    <h1>Search Results for "{{ location }}"</h1>
    {% if results %}
        <ul>
            {% for result in results %}
                <li>
                    <strong>{{ result.display_name }}</strong>
                    <a href="{{ url_for('select', index=loop.index0) }}">Select this location</a>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No results found.</p>
    {% endif %}
    <a href="{{ url_for('index') }}">Search again</a>
</body>
</html>
